<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- iPhone/タブレットで全画面・ズーム無効・ノッチ対応 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ことばあそび">
<meta name="theme-color" content="#ffd54a">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<!-- iOSのホーム画面アイコンはPNGのみ対応（SVG不可） -->
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<title>タッチ！ことばあそび</title>
<style>
  :root{
    --c1:#ff7eb9; --c2:#7afcff; --c3:#feff9c; --c4:#fff740;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
  }

  /* ===== 誤操作を抑える（あかちゃん向け） ===== */
  *{
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    box-sizing: border-box;
  }
  html, body{
    margin:0; padding:0;
    width:100%; height:100%;
    overflow:hidden;
    position:fixed;
    inset:0;
    overscroll-behavior:none;
    touch-action:none;            /* スクロール/ピンチズーム無効 */
    background:#2b2d6b;
    font-family:"Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic UI","Segoe UI",
                "Segoe UI Emoji","Apple Color Emoji",sans-serif;
  }

  /* ===== 背景（ゆっくり動くカラフルグラデーション） ===== */
  #bg{
    position:fixed; inset:0; z-index:0;
    background:linear-gradient(130deg,#ffb3e6,#a0e9ff,#ffe27a,#b5ffd1,#c6b4ff);
    background-size:400% 400%;
    animation:bgmove 24s ease infinite;
  }
  @keyframes bgmove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }
  /* ふわふわ浮かぶ大きな丸（飾り） */
  .blob{ position:fixed; border-radius:50%; filter:blur(2px); opacity:.35; z-index:0;
         animation:float 9s ease-in-out infinite; pointer-events:none; }

  @keyframes float{
    0%,100%{ transform:translateY(0) }
    50%{ transform:translateY(-26px) }
  }

  /* ===== 紙吹雪キャンバス ===== */
  #fx{ position:fixed; inset:0; z-index:5; pointer-events:none; }

  /* ===== タッチを受ける全画面レイヤー ===== */
  #stage{ position:fixed; inset:0; z-index:10; touch-action:none; }

  /* ===== 出てくる単語カード ===== */
  .pop{ position:fixed; z-index:20; transform:translate(-50%,-50%); pointer-events:none; will-change:transform; touch-action:none; }
  .pop .inner{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:18px 26px 22px;
    background:#fff;
    border-radius:34px;
    border:10px solid var(--bd, #ff7eb9);
    box-shadow:0 14px 30px rgba(0,0,0,.28), 0 0 0 6px rgba(255,255,255,.6) inset;
    animation:popIn 2.6s cubic-bezier(.2,1.4,.4,1) forwards;
    will-change:transform,opacity;
  }
  .pop .emoji{
    font-size:clamp(78px, 24vw, 190px);
    line-height:1;
    filter:drop-shadow(0 6px 8px rgba(0,0,0,.18));
    animation:wiggle 1.1s ease-in-out;
  }
  .pop .word{
    margin-top:8px;
    font-size:clamp(38px, 11vw, 96px);
    font-weight:900;
    letter-spacing:.04em;
    color:var(--bd,#ff7eb9);
    -webkit-text-stroke:2px rgba(0,0,0,.06);
  }
  @keyframes popIn{
    0%{   transform:scale(.2) translateY(0);   opacity:0 }
    14%{  transform:scale(1.18) translateY(0);  opacity:1 }
    24%{  transform:scale(.96) translateY(0);   opacity:1 }
    32%{  transform:scale(1) translateY(0);     opacity:1 }
    72%{  transform:scale(1) translateY(0);     opacity:1 }
    100%{ transform:scale(.82) translateY(-130px); opacity:0 }
  }
  @keyframes wiggle{
    0%,100%{ transform:rotate(0) }
    25%{ transform:rotate(-9deg) }
    60%{ transform:rotate(8deg) }
    80%{ transform:rotate(-4deg) }
  }

  /* ===== さいしょの「タッチしてね」ヒント ===== */
  #hint{
    position:fixed; inset:0; z-index:30;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; color:#fff; text-align:center; pointer-events:none;
    text-shadow:0 3px 10px rgba(0,0,0,.35);
    transition:opacity .5s ease;
  }
  #hint .big{ font-size:clamp(34px,8vw,64px); font-weight:900; }
  #hint .finger{ font-size:clamp(70px,16vw,130px); animation:tap 1.3s ease-in-out infinite; }
  #hint.hide{ opacity:0; }
  @keyframes tap{
    0%,100%{ transform:translateY(0) scale(1) }
    50%{ transform:translateY(-26px) scale(1.08) }
  }

  /* ===== 音オン/オフ（親用・右下／長押しで変更） ===== */
  #mute-wrap{
    position:fixed; z-index:40;
    bottom:calc(12px + var(--safe-bottom));
    right:calc(12px + var(--safe-right));
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  #mute{
    width:46px; height:46px; border:2px solid rgba(70,70,90,.5); border-radius:50%;
    background:rgba(255,255,255,.7); color:#333;
    font-size:22px; line-height:42px; text-align:center;
    opacity:.75; cursor:pointer;
    -webkit-appearance:none; appearance:none;
    -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
    transition:transform .15s ease, opacity .15s ease, background .15s ease;
  }
  #mute.holding{ transform:scale(1.25); background:rgba(255,236,120,.95); }
  #mute.flash{ animation:muteFlash .4s ease; }
  @keyframes muteFlash{ 0%{ transform:scale(1.3) } 100%{ transform:scale(1) } }
  #mute-label{
    font-size:10px; color:rgba(40,40,60,.7); font-weight:700;
    background:rgba(255,255,255,.55); padding:1px 6px; border-radius:8px;
    pointer-events:none;
  }
</style>
</head>
<body>
  <div id="bg"></div>
  <canvas id="fx"></canvas>
  <div id="stage"></div>

  <div id="hint">
    <div class="big">がめんを タッチしてね！</div>
    <div class="finger">👆</div>
  </div>

  <div id="mute-wrap">
    <button id="mute" aria-label="おと：オン" aria-pressed="false" title="ながおしで おと オン/オフ">🔊</button>
    <span id="mute-label">ながおし</span>
  </div>

<script>
(function(){
  "use strict";

  /* ===== 一時デバッグ（URLに ?debug=1 を付けたときだけ画面にログ表示） ===== */
  var DEBUG = /debug/.test(location.search);
  var dbgEl = null;
  function dlog(s){
    if (!DEBUG) return;
    if (!dbgEl){
      dbgEl = document.createElement("div");
      dbgEl.style.cssText = "position:fixed;left:0;top:0;right:0;max-height:46%;overflow:auto;z-index:99999;"+
        "background:rgba(0,0,0,.82);color:#5fffa0;font:12px/1.45 monospace;white-space:pre-wrap;padding:6px;pointer-events:none;";
      document.body.appendChild(dbgEl);
    }
    dbgEl.textContent += s + "\n";
    dbgEl.scrollTop = dbgEl.scrollHeight;
  }
  if (DEBUG){ window.addEventListener("error", function(e){ try{ dlog("JSエラー: "+e.message); }catch(_){} }); }

  /* =========================================================
     たんご（ひらがな＝声でよむ／絵文字＝みためのえ）
     どうぶつ・たべもの・のりもの をミックス
  ========================================================= */
  var WORDS = [
    // どうぶつ
    {w:"いぬ",e:"🐶"},{w:"ねこ",e:"🐱"},{w:"うさぎ",e:"🐰"},{w:"くま",e:"🐻"},
    {w:"パンダ",e:"🐼"},{w:"きつね",e:"🦊"},{w:"ライオン",e:"🦁"},{w:"とら",e:"🐯"},
    {w:"ぞう",e:"🐘"},{w:"きりん",e:"🦒"},{w:"さる",e:"🐵"},{w:"ぶた",e:"🐷"},
    {w:"うし",e:"🐮"},{w:"ひよこ",e:"🐤"},{w:"ことり",e:"🐦"},{w:"ペンギン",e:"🐧"},
    {w:"かえる",e:"🐸"},{w:"さかな",e:"🐟"},{w:"たこ",e:"🐙"},{w:"ちょうちょ",e:"🦋"},
    // たべもの
    {w:"りんご",e:"🍎"},{w:"バナナ",e:"🍌"},{w:"いちご",e:"🍓"},{w:"ぶどう",e:"🍇"},
    {w:"みかん",e:"🍊"},{w:"すいか",e:"🍉"},{w:"さくらんぼ",e:"🍒"},{w:"もも",e:"🍑"},
    {w:"パン",e:"🍞"},{w:"ケーキ",e:"🍰"},{w:"アイス",e:"🍦"},{w:"おにぎり",e:"🍙"},
    {w:"たまご",e:"🥚"},{w:"とうもろこし",e:"🌽"},{w:"にんじん",e:"🥕"},{w:"きのこ",e:"🍄"},
    // のりもの
    {w:"くるま",e:"🚗"},{w:"バス",e:"🚌"},{w:"でんしゃ",e:"🚃"},{w:"しんかんせん",e:"🚄"},
    {w:"ひこうき",e:"✈️"},{w:"ロケット",e:"🚀"},{w:"ふね",e:"⛵"},{w:"じてんしゃ",e:"🚲"},
    {w:"しょうぼうしゃ",e:"🚒"},{w:"パトカー",e:"🚓"},{w:"きゅうきゅうしゃ",e:"🚑"},
    {w:"トラック",e:"🚚"},{w:"ヘリコプター",e:"🚁"},{w:"きしゃ",e:"🚂"},
    // そのほか（そら・しぜん）
    {w:"おひさま",e:"☀️"},{w:"おつきさま",e:"🌙"},{w:"おほしさま",e:"⭐"},
    {w:"にじ",e:"🌈"},{w:"おはな",e:"🌸"},{w:"ゆきだるま",e:"⛄"}
  ];

  var COLORS = ["#ff5e8a","#ff8a3d","#ffc23d","#5ac85a","#3db8ff","#7a6bff","#ff6bd6","#22c3a6"];

  var lastIndex = -1;
  function pickWord(){
    var i;
    do { i = Math.floor(Math.random()*WORDS.length); }
    while (WORDS.length > 1 && i === lastIndex);   // 同じ単語の連続を避ける
    lastIndex = i;
    return WORDS[i];
  }
  function pickColor(){ return COLORS[Math.floor(Math.random()*COLORS.length)]; }

  /* =========================================================
     おと（Web Audio：ファイル不要でポップ音を合成）
  ========================================================= */
  var ac = null, master = null, muteGain = null;
  var muted = false;
  try { muted = (localStorage.getItem("kwg_muted") === "1"); } catch(e){ muted = false; }

  function ensureAudio(){
    if (ac){
      // iOSで音が壊れた(closed)場合は作り直す。中断/停止中なら復帰させる。
      if (ac.state === "closed"){ ac = null; master = null; muteGain = null; }
      else { if (ac.state !== "running"){ try{ ac.resume(); }catch(e){} } return; }
    }
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    try {
      ac = new AC();
      master = ac.createGain();
      master.gain.value = 0.5;
      // muteGain：再生中の音も即ミュートできるようにする
      muteGain = ac.createGain();
      muteGain.gain.value = muted ? 0 : 1;
      master.connect(muteGain);
      muteGain.connect(ac.destination);
      // 電話・バックグラウンド復帰などで中断したら自動で戻す（iOS対策）
      ac.onstatechange = function(){
        if (ac && ac.state !== "running" && ac.state !== "closed"){ try{ ac.resume(); }catch(e){} }
      };
      if (ac.state !== "running") ac.resume();
    } catch(e){
      ac = null; master = null; muteGain = null;   // 失敗時は無音で続行
    }
  }

  function playPop(){
    if (muted || !ac || !master) return;
    if (ac.state === "suspended"){ try{ ac.resume(); }catch(e){} }
    var t = ac.currentTime;
    // メインのポップ
    var o = ac.createOscillator(), g = ac.createGain();
    o.type = "triangle";
    o.frequency.setValueAtTime(420, t);
    o.frequency.exponentialRampToValueAtTime(950, t + 0.10);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.5, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.26);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.3);
    // きらきら（ちいさな高音）
    var o2 = ac.createOscillator(), g2 = ac.createGain();
    o2.type = "sine";
    o2.frequency.setValueAtTime(1400, t + 0.05);
    o2.frequency.exponentialRampToValueAtTime(2100, t + 0.2);
    g2.gain.setValueAtTime(0.0001, t + 0.05);
    g2.gain.exponentialRampToValueAtTime(0.18, t + 0.08);
    g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
    o2.connect(g2); g2.connect(master);
    o2.start(t + 0.05); o2.stop(t + 0.34);
  }

  /* =========================================================
     こえ（Web Speech：日本語で読み上げ）
  ========================================================= */
  var jaVoice = null;
  var canSpeak = ("speechSynthesis" in window) && ("SpeechSynthesisUtterance" in window);
  var lastSpeak = 0;
  var SPEAK_THROTTLE = 280;   // 連打時に合成エンジンが詰まらないよう間引く（見た目・効果音は毎回出る）

  function loadVoice(){
    if (!canSpeak) return;
    var vs;
    try { vs = window.speechSynthesis.getVoices(); }
    catch(e){ canSpeak = false; return; }   // getVoices自体が失敗する環境（無音で続行）
    if (!vs || !vs.length) return;          // まだ読み込み中（onvoiceschangedで再試行）
    var pick = null;
    // 1) lang が ja で始まる声
    for (var i=0;i<vs.length;i++){
      if (vs[i].lang && vs[i].lang.toLowerCase().indexOf("ja") === 0){ pick = vs[i]; break; }
    }
    // 2) 名前で日本語っぽい声をさがす（Kyoko / O-ren / Google 日本語 など）
    if (!pick){
      for (var j=0;j<vs.length;j++){
        var n = (vs[j].name || "").toLowerCase();
        if (n.indexOf("japan") >= 0 || n.indexOf("kyoko") >= 0 || n.indexOf("o-ren") >= 0 ||
            (vs[j].name && vs[j].name.indexOf("日本") >= 0)){ pick = vs[j]; break; }
      }
    }
    jaVoice = pick;   // 見つからなくても u.lang="ja-JP" で読ませる
  }
  if (canSpeak){
    loadVoice();
    window.speechSynthesis.onvoiceschanged = loadVoice;
  }

  function speak(text){
    if (muted || !canSpeak){ dlog("speak skip: muted="+muted+" canSpeak="+canSpeak); return; }
    var now = Date.now();
    if (now - lastSpeak < SPEAK_THROTTLE){ dlog("speak skip: throttle ("+(now-lastSpeak)+"ms)"); return; }
    lastSpeak = now;
    try {
      var synth = window.speechSynthesis;
      dlog("speak('"+text+"') 前: speaking="+synth.speaking+" pending="+synth.pending+" paused="+synth.paused+" ac="+(ac?ac.state:"null")+" voice="+(jaVoice?jaVoice.name:"なし"));
      // iOS対策：いちばん最初の発話より前に cancel() を呼ぶと、ユーザー操作による
      // 音声の「解錠」が行われず、以後ずっと無音のままになる不具合がある。
      // そのため「すでに喋っている／待機中のときだけ」止めて最新語に差し替える。
      if (synth.speaking || synth.pending){ synth.cancel(); dlog("  cancel()した"); }
      if (synth.paused) synth.resume(); // Chromeで一時停止状態に陥るのを回復
      var u = new SpeechSynthesisUtterance(text);
      u.lang = "ja-JP";
      if (jaVoice) u.voice = jaVoice;
      u.rate = 0.85;   // ゆっくりめ
      u.pitch = 1.25;  // すこし高め＝やさしい印象
      u.volume = 1.0;
      u.onstart = function(){ dlog("  ▶ onstart 発話開始"); };
      u.onend   = function(){ dlog("  ■ onend 発話終了"); };
      u.onerror = function(e){ dlog("  ✗ onerror: "+(e&&e.error?e.error:"?")); };
      synth.speak(u);
      dlog("  synth.speak() 呼んだ");
      setTimeout(function(){ dlog("  400ms後: speaking="+synth.speaking+" pending="+synth.pending); }, 400);
    } catch(e){ dlog("  例外: "+e.message); /* 読み上げ非対応でも続行 */ }
  }

  /* =========================================================
     単語カードを出す
  ========================================================= */
  var stage = document.getElementById("stage");
  var activeCards = [];
  var MAX_CARDS = 6;   // 低スペック端末でも軽いよう同時表示は控えめに

  function showWord(x, y){
    var data = pickWord();
    var color = pickColor();

    var pop = document.createElement("div");
    pop.className = "pop";
    pop.style.left = x + "px";
    pop.style.top  = y + "px";
    pop.style.setProperty("--bd", color);

    var inner = document.createElement("div");
    inner.className = "inner";

    var em = document.createElement("div");
    em.className = "emoji";
    em.textContent = data.e;

    var wd = document.createElement("div");
    wd.className = "word";
    wd.textContent = data.w;

    inner.appendChild(em);
    inner.appendChild(wd);
    pop.appendChild(inner);
    document.body.appendChild(pop);

    var removed = false;
    var killTimer = null;
    function remove(){
      if (removed) return; removed = true;
      if (killTimer){ clearTimeout(killTimer); killTimer = null; }
      inner.removeEventListener("animationend", remove);
      var idx = activeCards.indexOf(pop);
      if (idx >= 0) activeCards.splice(idx,1);
      if (pop.parentNode) pop.parentNode.removeChild(pop);
    }
    pop._remove = remove;
    inner.addEventListener("animationend", remove);
    killTimer = setTimeout(remove, 3000); // animationendが発火しない端末用の保険

    // 多すぎる時は古いカードをきちんと後始末して消す（連打対策・listenerリーク防止）
    activeCards.push(pop);
    while (activeCards.length > MAX_CARDS){
      var old = activeCards.shift();
      if (old && old._remove) old._remove();
      else if (old && old.parentNode) old.parentNode.removeChild(old);
    }

    speak(data.w);
    playPop();
    burst(x, y, color);
  }

  /* =========================================================
     紙吹雪（Canvas）
  ========================================================= */
  var fx = document.getElementById("fx");
  var ctx = fx.getContext("2d");
  var DPR = Math.min(window.devicePixelRatio || 1, 3);  // 3xの高精細端末でもくっきり
  var parts = [];
  var rafId = null;
  var PART_CAP = 220;   // 粒子の上限（連打時のGPU負荷を抑える）

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 3);
    fx.width  = Math.floor(window.innerWidth  * DPR);
    fx.height = Math.floor(window.innerHeight * DPR);
    fx.style.width  = window.innerWidth + "px";
    fx.style.height = window.innerHeight + "px";
    ctx.setTransform(DPR,0,0,DPR,0,0);
    // 画面回転・リサイズ時は古い座標の粒子を消す（位置ズレ防止）
    parts.length = 0;
    ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
  }
  resize();
  window.addEventListener("resize", resize);

  function burst(x, y, color){
    if (parts.length > PART_CAP - 30) return;   // 出しすぎ時はスキップ（音・声・絵は出る）
    var n = 18;
    for (var i=0;i<n;i++){
      var ang = (Math.PI*2) * (i/n) + Math.random()*0.5;
      var sp = 3 + Math.random()*6;
      parts.push({
        x:x, y:y,
        vx:Math.cos(ang)*sp,
        vy:Math.sin(ang)*sp - 3,
        g:0.22 + Math.random()*0.12,
        size:7 + Math.random()*9,
        rot:Math.random()*Math.PI,
        vr:(Math.random()-0.5)*0.3,
        life:0, max:55 + Math.random()*25,
        color: Math.random() < 0.5 ? color : COLORS[Math.floor(Math.random()*COLORS.length)],
        shape: Math.random() < 0.5 ? "rect" : "circle"
      });
    }
    if (parts.length > PART_CAP) parts.splice(0, parts.length - PART_CAP); // 上限
    if (!rafId) rafId = requestAnimationFrame(tick);
  }

  function tick(){
    ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
    for (var i=parts.length-1;i>=0;i--){
      var p = parts[i];
      p.vy += p.g;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      p.life++;
      var alpha = 1 - (p.life / p.max);
      if (alpha <= 0 || p.y > window.innerHeight + 40){ parts.splice(i,1); continue; }
      ctx.save();
      ctx.globalAlpha = Math.max(0, alpha);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if (p.shape === "rect"){
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
      } else {
        ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }
    if (parts.length > 0){ rafId = requestAnimationFrame(tick); }
    else { rafId = null; ctx.clearRect(0,0,window.innerWidth,window.innerHeight); }
  }

  /* =========================================================
     さいしょの飾り（ふわふわ丸）
  ========================================================= */
  (function makeBlobs(){
    var spec = [
      {s:160,l:"6%", t:"12%", c:"#ffffff", d:"0s"},
      {s:120,l:"78%",t:"18%", c:"#fff7b0", d:"1.5s"},
      {s:200,l:"68%",t:"66%", c:"#ffffff", d:"3s"},
      {s:140,l:"10%",t:"70%", c:"#bdf0ff", d:"2.2s"}
    ];
    for (var i=0;i<spec.length;i++){
      var b = document.createElement("div");
      b.className = "blob";
      b.style.width = b.style.height = spec[i].s + "px";
      b.style.left = spec[i].l; b.style.top = spec[i].t;
      b.style.background = spec[i].c;
      b.style.animationDelay = spec[i].d;
      document.getElementById("bg").appendChild(b);
    }
  })();

  /* =========================================================
     タッチ処理（ぜんぶの画面・複数の指OK）
  ========================================================= */
  var hint = document.getElementById("hint");
  var hintHidden = false;
  function hideHint(){ if(!hintHidden){ hintHidden = true; hint.classList.add("hide"); } }

  // ---- 放置中は背景アニメを止めてバッテリー節約（90秒で停止） ----
  var bgEl = document.getElementById("bg");
  var idleTimer = null, idleState = false;
  function setAnim(state){
    bgEl.style.animationPlayState = state;
    var blobs = document.getElementsByClassName("blob");
    for (var i=0;i<blobs.length;i++){ blobs[i].style.animationPlayState = state; }
  }
  function kickIdle(){
    if (idleState){ setAnim("running"); idleState = false; }
    if (idleTimer) clearTimeout(idleTimer);
    idleTimer = setTimeout(function(){ idleState = true; setAnim("paused"); }, 90000);
  }
  kickIdle();

  function onDown(e){
    dlog("--- tap (type="+e.type+") ---");
    ensureAudio();             // 最初のタッチで音を有効化（iOS対策）
    dlog("ensureAudio後: ac="+(ac?ac.state:"null"));
    hideHint();
    kickIdle();

    // Pointer Events：1本の指ごとに1回呼ばれる
    var x = (e.clientX != null) ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
    var y = (e.clientY != null) ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
    showWord(x, y);
  }

  // Pointer Events があれば最優先（マウス・タッチ・ペン統一）
  if (window.PointerEvent){
    stage.addEventListener("pointerdown", onDown, {passive:true});
  } else {
    // 古い端末向けフォールバック
    stage.addEventListener("touchstart", function(e){
      ensureAudio(); hideHint(); kickIdle();
      for (var i=0;i<e.changedTouches.length;i++){
        var t = e.changedTouches[i];
        showWord(t.clientX, t.clientY);
      }
    }, {passive:true});
    stage.addEventListener("mousedown", onDown, {passive:true});
  }

  // ピンチズーム・ダブルタップズームを念のため抑止
  document.addEventListener("gesturestart", function(e){ e.preventDefault(); });
  document.addEventListener("dblclick", function(e){ e.preventDefault(); });
  document.addEventListener("contextmenu", function(e){ e.preventDefault(); });

  /* =========================================================
     音オン/オフ
  ========================================================= */
  var muteBtn = document.getElementById("mute");
  function renderMute(){
    muteBtn.textContent = muted ? "🔇" : "🔊";
    muteBtn.style.opacity = muted ? "0.5" : "0.75";
    muteBtn.setAttribute("aria-label", muted ? "おと：オフ" : "おと：オン");
    muteBtn.setAttribute("aria-pressed", String(muted));
  }
  renderMute();

  function toggleMute(){
    muted = !muted;
    try { localStorage.setItem("kwg_muted", muted ? "1" : "0"); } catch(e){ /* 保存できなくても続行 */ }
    if (muteGain && ac){ try { muteGain.gain.setValueAtTime(muted ? 0 : 1, ac.currentTime); } catch(e){ muteGain.gain.value = muted ? 0 : 1; } }
    if (muted && canSpeak){ try{ window.speechSynthesis.cancel(); }catch(_){} }
    if (!muted) ensureAudio();
    muteBtn.classList.remove("holding");
    muteBtn.classList.add("flash");
    setTimeout(function(){ muteBtn.classList.remove("flash"); }, 400);
    renderMute();
  }

  // 長押し（700ms）で切替＝あかちゃんの誤タップで勝手に変わらない
  var holdTimer = null;
  function startHold(e){
    if (e) e.stopPropagation();
    ensureAudio();
    muteBtn.classList.add("holding");
    if (holdTimer) clearTimeout(holdTimer);
    holdTimer = setTimeout(function(){ holdTimer = null; toggleMute(); }, 700);
  }
  function cancelHold(){
    if (holdTimer){ clearTimeout(holdTimer); holdTimer = null; }
    muteBtn.classList.remove("holding");
  }
  if (window.PointerEvent){
    muteBtn.addEventListener("pointerdown", startHold);
    muteBtn.addEventListener("pointerup", cancelHold);
    muteBtn.addEventListener("pointerleave", cancelHold);
    muteBtn.addEventListener("pointercancel", cancelHold);
  } else {
    muteBtn.addEventListener("touchstart", startHold, {passive:true});
    muteBtn.addEventListener("touchend", cancelHold);
    muteBtn.addEventListener("touchcancel", cancelHold);
    muteBtn.addEventListener("mousedown", startHold);
    muteBtn.addEventListener("mouseup", cancelHold);
    muteBtn.addEventListener("mouseleave", cancelHold);
  }
  // クリック単体では切り替えない（誤操作防止）。長押しのみ。
  muteBtn.addEventListener("click", function(e){ e.stopPropagation(); e.preventDefault(); });

})();
</script>
</body>
</html>
